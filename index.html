<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #todoList {
            border-collapse: collapse;
            width: 70%;
            margin: 0 auto;
        }
        #todoList th, #todoList td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        #todoList th {
            background-color: #f0f0f0;
        }
        #todoList th:first-child, #todoList th:last-child {
            width: 5%;
        }
        #todoList th:nth-child(2) {
            width: 90%;
        }
        .add-form {
            margin-top: 20px;
            width: 70%;
            margin: 20px auto;
        }
        .add-form input[type="text"] {
            padding: 8px;
            width: 70%;
        }
        .add-form button {
            padding: 8px;
            width: 20%;
        }
        .edit-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">To-Do List</h2>

<table id="todoList">
    <thead>
        <tr>
            <th>Number</th>
            <th>Text</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="listBody">
        {{rows}}
    </tbody>
</table>

<div class="add-form">
    <input type="text" id="newItem" placeholder="Enter new item">
    <button onclick="addItem()">Add</button>
</div>

<script>
    let items = [];
    let nextId = 1;
    let editing = null;

    function renderList() {
        const listBody = document.getElementById('listBody');
        listBody.innerHTML = '';

        items.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${index + 1}</td>
                <td class="item-text">${item.text}</td>
                <td>
                    <button onclick="editItem(${index})">Edit</button>
                    <button onclick="removeItem(${index})">Remove</button>
                </td>
            `;
            listBody.appendChild(row);
        });
    }

    function addItem() {
        const newItemInput = document.getElementById('newItem');
        const newItemText = newItemInput.value.trim();

        if (newItemText) {
            items.push({ id: nextId++, text: newItemText });
            newItemInput.value = '';
            renderList();
        }
    }

    function removeItem(index) {
        items.splice(index, 1);
        renderList();
    }

    function editItem(index) {
        if (editing !== null) return;
        
        const row = document.querySelectorAll('tr')[index + 1];
        const textCell = row.querySelector('.item-text');
        const text = textCell.textContent;
        
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'edit-input';
        input.value = text;
        
        textCell.textContent = '';
        textCell.appendChild(input);
        input.focus();
        
        editing = {
            index: index,
            input: input,
            originalText: text
        };
        
        input.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') saveEdit(index);
        });
        
        input.addEventListener('blur', () => saveEdit(index));
    }

    function saveEdit(index) {
        if (!editing) return;
        
        const { input, originalText } = editing;
        const newValue = input.value.trim();
        
        if (newValue === originalText) {
            cancelEdit();
            return;
        }
        
        if (newValue) {
            items[index].text = newValue;
        } else {
            removeItem(index);
        }
        
        cancelEdit();
        renderList();
    }

    function cancelEdit() {
        if (editing) {
            const { input } = editing;
            input.parentNode.removeChild(input);
            editing = null;
        }
    }
</script>

</body>
</html>
